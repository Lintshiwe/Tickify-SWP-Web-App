services:
  - type: web
    name: tickify
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /tickify/
    envVars:
      - key: TICKIFY_DB_MODE
        value: embedded
      - key: TICKIFY_DB_NAME
        value: /opt/tickify/data/tickifyDB
      - key: TICKIFY_DB_USER
        value: tickify
      - key: TICKIFY_DB_PASSWORD
        value: tickifypass
      - key: TICKIFY_DB_POOL_SIZE
        value: "10"
      - key: TICKIFY_RESET_TOKEN_SECRET
        value: tickify-prod-secret-change-me
      - key: TICKIFY_APP_BASE_URL
        value: https://tickify.onrender.com
      - key: TICKIFY_SMTP_HOST
        sync: false
      - key: TICKIFY_SMTP_PORT
        sync: false
      - key: TICKIFY_SMTP_USER
        sync: false
      - key: TICKIFY_SMTP_PASSWORD
        sync: false
      - key: TICKIFY_SMTP_FROM
        sync: false
