<!DOCTYPE html>
<html>
    <head>
        <title>Tickify - Event Management</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <style>
            :root {
                --green: #79c84a;
                --green-dark: #5ca833;
                --bg: #f7faf6;
                --ink: #3a4a3e;
                --muted: #76857a;
                --line: #d8e5d5;
                --panel: #ffffff;
            }
            * { box-sizing: border-box; }
            body {
                margin: 0;
                font-family: "Trebuchet MS", "Segoe UI", sans-serif;
                color: var(--ink);
                background:
                    radial-gradient(circle at 10% 0%, #eef8e9 0%, transparent 40%),
                    radial-gradient(circle at 90% 20%, #edf7e9 0%, transparent 35%),
                    var(--bg);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 24px;
                border-bottom: 1px solid var(--line);
                background:#f7f8f6 url('/tickify/assets/Tickify-header-background.png') center/cover no-repeat;
                flex-wrap: wrap;
                gap: 12px;
            }
            .logo {
                display: flex;
                align-items: center;
                gap: 10px;
                text-decoration: none;
            }
            .logo img { height: 40px; }
            .logo span {
                font-size: 26px;
                font-weight: 800;
                letter-spacing: 1px;
                color: #2d5a36;
            }
            .auth-links { display: flex; gap: 10px; }
            .auth-links a {
                text-decoration: none;
                padding: 8px 18px;
                border-radius: 8px;
                font-weight: 700;
                font-size: 14px;
                transition: 0.2s;
            }
            .btn-login {
                background: transparent;
                color: var(--green-dark);
                border: 2px solid var(--green);
            }
            .btn-login:hover { background: #eef7e8; }
            .btn-register {
                background: var(--green);
                color: #fff;
                border: 2px solid var(--green);
            }
            .btn-register:hover { background: var(--green-dark); }
            main {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                text-align: center;
            }
            h1 { font-size: 44px; color: #24412b; margin: 0 0 10px; }
            .tagline { color: var(--muted); font-size: 18px; margin: 0 0 32px; max-width: 520px; }
            .btn-go {
                display: inline-block;
                background: var(--green);
                color: #fff;
                text-decoration: none;
                font-size: 20px;
                font-weight: 800;
                padding: 14px 48px;
                border-radius: 14px;
                border: none;
                cursor: pointer;
                transition: 0.2s;
                box-shadow: 0 4px 14px rgba(121,200,74,0.35);
            }
            .btn-go:hover {
                background: var(--green-dark);
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(92,168,51,0.4);
            }
            footer {
                text-align: center;
                padding: 16px;
                color: var(--muted);
                font-size: 12px;
                border-top: 1px solid var(--line);
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <span>Tickify</span>
            </div>
            <div class="auth-links">
                <a href="Login.jsp" class="btn-login">Login</a>
                <a href="UserSignUp.jsp" class="btn-register">Sign Up</a>
            </div>
        </header>
        <main>
            <h1>Your Campus. Your Events.</h1>
            <p class="tagline">Discover, book, and manage tickets for the best events across South African tertiary institutions. Easy. Fast. Tickify.</p>
            <a href="AttendeeDashboardServlet.do" class="btn-go">Browse Events</a>
        </main>
        <footer>
            &copy; 2026 Tickify. All rights reserved.
        </footer>
    </body>
</html>
