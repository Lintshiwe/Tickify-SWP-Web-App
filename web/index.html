<!DOCTYPE html>
<html>
    <head>
        <title>Tickify - Event Management</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            /* Reset and Base Styles */
            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
            }

            /* Header - Black with White text */
            header {
                background-color: #000000;
                color: #FFFFFF;
                padding: 20px;
                text-align: center;
                border-bottom: 5px solid #FFD700; /* Yellow accent */
            }

            /* Bold Tickify appearing first */
            .logo {
                font-size: 2.5em;
                font-weight: bold;
                letter-spacing: 2px;
            }

            /* Body - White background */
            main {
                flex: 1; /* Pushes footer to bottom */
                background-color: #FFFFFF;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 40px;
            }

            /* Button - Yellow with Black text */
            .btn-login {
                background-color: #FFD700;
                color: #000000;
                padding: 15px 30px;
                text-decoration: none;
                font-weight: bold;
                border-radius: 5px;
                font-size: 1.2em;
                transition: transform 0.2s;
            }

            .btn-login:hover {
                transform: scale(1.05);
                background-color: #e6c200;
            }

            /* Footer - Black with Yellow text */
            footer {
                background-color: #000000;
                color: #FFD700;
                padding: 15px;
                text-align: center;
                font-size: 0.9em;
            }
        </style>
    </head>
    <body>

        <header>
            <div class="logo">TICKIFY</div>
            <p>Your University Event Partner</p>
        </header>

        <main>
            <h1>Welcome to Tickify</h1>
            <p>Manage, Book, and Secure University Events across South Africa.</p>
            <br>
            <a href="UserSelection.jsp" class="btn-login">Enter System</a>
        </main>

        <footer>
            &copy; 2026 Tickify Group Project. All Rights Reserved.
        </footer>

        <script>
            window.onload = function () {
                const urlParams = new URLSearchParams(window.location.search);
                let shouldCleanUrl = false;

                // Check for Account Deletion
                if (urlParams.get('msg') === 'AccountDeleted') {
                    alert("Your account has been permanently deleted. We're sorry to see you go!");
                    shouldCleanUrl = true;
                }

                // Check for Errors
                if (urlParams.get('error') === 'DatabaseError') {
                    alert("An error occurred while trying to delete your account. Please try again later.");
                    shouldCleanUrl = true;
                }

                // Check for Logout
                if (urlParams.get('status') === 'loggedOut') {
                    alert("You have successfully logged out.");
                    shouldCleanUrl = true;
                }

                // Clean the URL only once if any message was shown
                if (shouldCleanUrl) {
                    window.history.replaceState({}, document.title, "index.html");
                }
            };
        </script>
    </body>
</html>
